<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f6"/>
      <stop offset="100%" stop-color="#f7f1ff"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7c4d8"/>
      <stop offset="100%" stop-color="#e87aab"/>
    </linearGradient>
    <linearGradient id="petalAlt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0bbf2"/>
      <stop offset="100%" stop-color="#a97de6"/>
    </linearGradient>
    <radialGradient id="center" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fffaf5"/>
      <stop offset="100%" stop-color="#ffe9de"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <g transform="translate(256 256)">
    <g>
      <ellipse cx="0" cy="-95" rx="55" ry="100" fill="url(#petal)" transform="rotate(0)"/>
      <ellipse cx="0" cy="-95" rx="55" ry="100" fill="url(#petalAlt)" transform="rotate(60)"/>
      <ellipse cx="0" cy="-95" rx="55" ry="100" fill="url(#petal)" transform="rotate(120)"/>
      <ellipse cx="0" cy="-95" rx="55" ry="100" fill="url(#petalAlt)" transform="rotate(180)"/>
      <ellipse cx="0" cy="-95" rx="55" ry="100" fill="url(#petal)" transform="rotate(240)"/>
      <ellipse cx="0" cy="-95" rx="55" ry="100" fill="url(#petalAlt)" transform="rotate(300)"/>
    </g>
    <circle r="42" fill="url(#center)"/>
    <circle r="14" fill="#e87aab"/>
  </g>
</svg>
